<html lang="hu">
<head>

    <title>Süti OOJS</title>

    <link rel="stylesheet" href="/suti.css">
    <style>
        /* Helyi stílusok a kártyák elrendezéséhez */

        .dijazott { border-color: gold; box-shadow: 0 0 10px gold; } /* Speciális kiemelés a díjazott sütemények számára (Polimorfizmus szemléltetése) */
    </style>
</head>

     <h1>🍰 Sütemény OOJS Menü </h1>
