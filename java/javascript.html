<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sütemény Árlista - CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="back-button">← Vissza a főoldalra</a>
    </div>
    
    <div class="container">
        <h1>🍰 Sütemény Árak Kezelése</h1>

       <div class="form-card">
            <div class="input-group">
                <label for="sutiid">Sütemény ID</label>
                <input type="number" id="sutiid" placeholder="Sütemény ID">
            </div>
            <div class="input-group">
                <label for="ertek">Érték (Ár)</label>
                <input type="number" id="ertek" placeholder="Ár megadása">
            </div>
            <div class="input-group">
                <label for="egyseg">Egység (Típus)</label>
                <input type="text" id="egyseg" placeholder="Típus (pl. 16 szeletes, db)">
            </div>
            <input type="hidden" id="edit-id">
            <button id="main-button" onclick="mentes()">Hozzáadás</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Süti ID</th>
                        <th>Ár</th>
                        <th>Egység</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="adat-tablazat">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
