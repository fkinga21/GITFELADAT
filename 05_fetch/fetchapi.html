<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/suti.css">
    <title>Süti CRUD Alkalmazás</title>
</head>
<body>
     
  <div class="container">
    <h1 class="title">🍰 Sütemény Adatbázis - Fetch CRUD</h1>
    
    <div class="card">
        <div class="form-group">
            <label>ID</label>
            <input type="number" id="idInput" placeholder="ID (pl. 24)">
            <label>Süti ID</label>
            <input type="number" id="sutiInput" placeholder="Süti ID">
            <label>Mentes</label>
            <input type="text" id="mentesInput" placeholder="Mentes (pl. G, L, HC)">
            <button class="add-btn" onclick="addItem()">Hozzáadás</button>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Süti ID</th>
                <th>Mentes</th>
                <th>Műveletek</th>
            </tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>
</div>
    <script src="/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
